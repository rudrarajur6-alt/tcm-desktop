<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Cloud Market</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f1629; }

        .app-container {
            display:flex;
            height:100vh;
            padding-top:36px; /* titlebar overlay */
        }

        /* Sidebar */
        .sidebar {
            width:56px;
            background:#0a0e1a;
            border-right:1px solid rgba(255,255,255,0.06);
            display:flex;
            flex-direction:column;
            align-items:center;
            padding-top:12px;
            gap:4px;
            flex-shrink:0;
        }

        .sidebar .tab {
            width:44px;
            height:44px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:all 0.15s;
            position:relative;
        }
        .sidebar .tab:hover { background:rgba(255,255,255,0.06); }
        .sidebar .tab.active { background:rgba(34,197,94,0.15); }
        .sidebar .tab.active::before {
            content:'';
            position:absolute;
            left:0;
            top:50%;
            transform:translateY(-50%);
            width:3px;
            height:20px;
            background:#22c55e;
            border-radius:0 3px 3px 0;
        }
        .sidebar .tab svg { width:22px; height:22px; fill:#64748b; transition:fill 0.15s; }
        .sidebar .tab.active svg { fill:#22c55e; }
        .sidebar .tab-label {
            font-size:9px;
            color:#64748b;
            text-align:center;
            margin-top:2px;
        }
        .sidebar .tab.active .tab-label { color:#22c55e; }

        .sidebar .spacer { flex:1; }

        /* Main content */
        .content {
            flex:1;
            position:relative;
        }

        webview {
            width:100%;
            height:100%;
            border:none;
            display:none;
        }
        webview.active { display:flex; }

        /* Loading */
        .loading {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            z-index:10;
        }
        .spinner {
            width:32px; height:32px;
            border:3px solid rgba(34,197,94,0.2);
            border-top:3px solid #22c55e;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <!-- Email -->
            <div class="tab" id="tab-email" onclick="switchTab('email')" title="Email">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </div>

            <!-- Files -->
            <div class="tab active" id="tab-files" onclick="switchTab('files')" title="Files">
                <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
            </div>

            <!-- Calendar -->
            <div class="tab" id="tab-calendar" onclick="switchTab('calendar')" title="Calendar">
                <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
            </div>

            <!-- Talk -->
            <div class="tab" id="tab-talk" onclick="switchTab('talk')" title="Talk">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
            </div>

            <div class="spacer"></div>

            <!-- More/Dashboard -->
            <div class="tab" id="tab-more" onclick="switchTab('more')" title="Workspace">
                <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
            </div>
        </div>

        <div class="content">
            <div class="loading" id="loader"><div class="spinner"></div></div>

            <div id="email-picker" class="" style="width:100%;height:100%;background:#0f1629;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px">
                <svg viewBox="0 0 24 24" style="width:48px;height:48px;fill:#22c55e;margin-bottom:8px"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <h2 style="color:#fff;font-size:20px;margin:0">Open Your Email</h2>
                <p style="color:#94a3b8;font-size:13px;margin:0">Choose your email provider</p>
                <button onclick="loadEmail('https://mail.google.com/mail/')" style="width:280px;padding:14px;background:#ea4335;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">
                    Gmail
                </button>
                <button onclick="openOutlookApp()" style="width:280px;padding:14px;background:#0078d4;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">
                    Open Outlook App
                </button>
                <button onclick="loadEmail('https://mail.thecloud.market/')" style="width:280px;padding:14px;background:#1a2340;color:#94a3b8;border:1px solid #334155;border-radius:10px;font-size:13px;cursor:pointer">
                    TCM Webmail (Roundcube)
                </button>
            </div>
            <webview id="wv-email" class="" src="about:blank" partition="persist:tcm-email" style="display:none"></webview>
            <webview id="wv-files" class="active" src="https://cyberollie.thecloud.market/index.php/apps/files/" partition="persist:tcm"></webview>
            <webview id="wv-calendar" class="" src="about:blank" partition="persist:tcm"></webview>
            <webview id="wv-talk" class="" src="about:blank" partition="persist:tcm"></webview>
            <webview id="wv-more" class="" src="about:blank" partition="persist:tcm"></webview>
        </div>
    </div>

    <script>
        const WORKSPACE = 'https://cyberollie.thecloud.market';
        const tabs = {
            email: { wv: 'wv-email', url: 'https://mail.thecloud.market/' },
            files: { wv: 'wv-files', url: WORKSPACE + '/index.php/apps/files/' },
            calendar: { wv: 'wv-calendar', url: WORKSPACE + '/index.php/apps/calendar/' },
            talk: { wv: 'wv-talk', url: WORKSPACE + '/index.php/apps/spreed/' },
            more: { wv: 'wv-more', url: WORKSPACE + '/index.php/apps/dashboard/' },
        };

        let loaded = { files: true };
        let emailLoaded = false;

        function switchTab(name) {
            // Hide all webviews and pickers
            document.querySelectorAll('webview').forEach(wv => wv.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('email-picker').style.display = 'none';

            document.getElementById('tab-' + name).classList.add('active');

            if (name === 'email') {
                if (emailLoaded) {
                    document.getElementById('wv-email').style.display = 'flex';
                    document.getElementById('wv-email').classList.add('active');
                } else {
                    document.getElementById('email-picker').style.display = 'flex';
                    document.getElementById('email-picker').classList.add('active');
                }
                return;
            }

            // Show selected webview
            document.getElementById(tabs[name].wv).classList.add('active');

            // Lazy load
            if (!loaded[name]) {
                document.getElementById('loader').style.display = 'block';
                document.getElementById(tabs[name].wv).src = tabs[name].url;
                loaded[name] = true;
            }
        }

        function loadEmail(url) {
            document.getElementById('email-picker').style.display = 'none';
            document.getElementById('wv-email').src = url;
            document.getElementById('wv-email').style.display = 'flex';
            document.getElementById('wv-email').classList.add('active');
            document.getElementById('loader').style.display = 'block';
            emailLoaded = true;
        }

        function openOutlookApp() {
            // Open Outlook desktop app via protocol
            window.open('mailto:', '_blank');
        }

        // Hide loader when any webview finishes loading
        document.querySelectorAll('webview').forEach(wv => {
            wv.addEventListener('did-finish-load', () => {
                document.getElementById('loader').style.display = 'none';
            });
        });
    </script>
</body>
</html>
