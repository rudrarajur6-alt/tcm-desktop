name: Build Windows Installer

on:
  push:
    branches: [master, main]
    tags: ['workspace-v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Cut a release even on a non-tag run (uses workspace-dev-<run>)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build-win

      - name: Rename installer to stable filename
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path dist -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $src) { throw "No installer found in dist/" }
          Copy-Item -Path $src.FullName -Destination "dist/TheCloudMarket-Workspace-Setup.exe" -Force
          Get-ChildItem dist/*.exe | ForEach-Object { Write-Host "$($_.Name)  $([math]::Round($_.Length/1MB,1)) MB" }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheCloudMarket-Workspace-Setup
          path: dist/TheCloudMarket-Workspace-Setup.exe
          retention-days: 30

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/workspace-v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.release }}" == "true" ]]; then
            echo "tag=workspace-dev-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: steps.tag.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "TCM Workspace ${{ steps.tag.outputs.tag }}"
          body: |
            ## The Cloud Market — Workspace Desktop

            One app for Email, Files, Calendar, Talk and your workspace
            dashboard. Signs in automatically via the one-click setup
            link from your welcome email — no passwords to enter.

            ### Install
            1. Download `TheCloudMarket-Workspace-Setup.exe` below.
            2. Run it — installs to your user profile, creates a desktop
               shortcut, starts the app.
            3. Click the setup link in your welcome email. Done.
          files: dist/TheCloudMarket-Workspace-Setup.exe
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'dev') }}
          fail_on_unmatched_files: true
