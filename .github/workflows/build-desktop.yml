name: Build Desktop Installers (Windows + macOS)

on:
  push:
    branches: [master, main]
    tags: ['workspace-v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Cut a release even on a non-tag run'
        required: false
        default: 'false'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build-win

      - name: Rename installer
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path dist -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $src) { throw "No installer found in dist/" }
          Copy-Item -Path $src.FullName -Destination "dist/TheCloudMarket-Workspace-Setup.exe" -Force
          Get-ChildItem dist/*.exe | ForEach-Object { Write-Host "$($_.Name)  $([math]::Round($_.Length/1MB,1)) MB" }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheCloudMarket-Workspace-Setup-Windows
          path: dist/TheCloudMarket-Workspace-Setup.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg --publish never

      - name: Rename DMG
        run: |
          src=$(find dist -name "*.dmg" | head -1)
          if [ -z "$src" ]; then echo "No DMG found"; exit 1; fi
          cp "$src" dist/TheCloudMarket-Workspace.dmg
          ls -lh dist/*.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheCloudMarket-Workspace-macOS
          path: dist/TheCloudMarket-Workspace.dmg
          retention-days: 30

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/workspace-v') || github.event.inputs.release == 'true'
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TheCloudMarket-Workspace-Setup-Windows
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TheCloudMarket-Workspace-macOS
          path: release/

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/workspace-v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=workspace-dev-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "TCM Workspace ${{ steps.tag.outputs.tag }}"
          body: |
            ## The Cloud Market — Workspace Desktop

            One app for Email, Files, Calendar, Talk and your workspace dashboard.

            ### Windows
            Download `TheCloudMarket-Workspace-Setup.exe` and run it.

            ### macOS
            Download `TheCloudMarket-Workspace.dmg`, open it, drag to Applications.

            Sign in with your workspace URL and credentials.
          files: |
            release/TheCloudMarket-Workspace-Setup.exe
            release/TheCloudMarket-Workspace.dmg
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'dev') }}
          fail_on_unmatched_files: true
